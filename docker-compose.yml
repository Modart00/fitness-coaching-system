services:
  mysql:
    image: mysql:8.0
    container_name: fitness-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fitness_coaching_system_db
    ports:
      - "3307:3306"
    volumes:
      - fitness_mysql_data:/var/lib/mysql

  app:
    image: fitness-coaching-system:latest
    container_name: fitness-app
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fitness_coaching_system_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  fitness_mysql_data:
